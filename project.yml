name: CatMonitor
options:
  bundleIdPrefix: com.korn
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: C24PP88J9S

targets:
  CatMonitorApp:
    type: application
    platform: macOS
    sources:
      - path: App/Sources
      - path: Shared/Sources
      - path: App/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.korn.catmonitor
        PRODUCT_NAME: Cat Monitor
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    info:
      path: App/Info.plist
      properties:
        LSUIElement: true
